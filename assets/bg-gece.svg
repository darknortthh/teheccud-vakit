<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="50%" cy="20%" r="80%">
      <stop offset="0%"  stop-color="#1d2a5a" stop-opacity="1"/>
      <stop offset="35%" stop-color="#131a36" stop-opacity="1"/>
      <stop offset="80%" stop-color="#0a0818" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="hilal-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f0d999" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#f0d999" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon-light" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#c9a45a" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c9a45a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="silhouette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0818" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0818" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Gökyüzü -->
  <rect width="1080" height="1920" fill="url(#sky)"/>

  <!-- Yumuşak ay ışığı halkası -->
  <circle cx="820" cy="240" r="380" fill="url(#hilal-glow)"/>
  <!-- Ufuktan gelen sıcak ışıma -->
  <ellipse cx="540" cy="1500" rx="900" ry="500" fill="url(#moon-light)"/>

  <!-- Yıldızlar -->
  <g fill="#f0d999" opacity="0.85">
    <circle cx="120"  cy="160"  r="2.0"/>
    <circle cx="220"  cy="320"  r="1.4"/>
    <circle cx="380"  cy="140"  r="2.4"/>
    <circle cx="500"  cy="280"  r="1.2"/>
    <circle cx="660"  cy="180"  r="1.8"/>
    <circle cx="940"  cy="120"  r="2.2"/>
    <circle cx="160"  cy="480"  r="1.6"/>
    <circle cx="310"  cy="540"  r="1.0"/>
    <circle cx="480"  cy="600"  r="1.8"/>
    <circle cx="620"  cy="430"  r="1.3"/>
    <circle cx="780"  cy="500"  r="2.0"/>
    <circle cx="930"  cy="380"  r="1.5"/>
    <circle cx="1010" cy="560"  r="1.7"/>
    <circle cx="60"   cy="700"  r="1.4"/>
    <circle cx="220"  cy="780"  r="1.9"/>
    <circle cx="430"  cy="820"  r="1.0"/>
    <circle cx="570"  cy="760"  r="1.5"/>
    <circle cx="730"  cy="850"  r="1.2"/>
    <circle cx="860"  cy="720"  r="2.1"/>
    <circle cx="990"  cy="880"  r="1.4"/>
    <circle cx="140"  cy="1000" r="1.7"/>
    <circle cx="340"  cy="1080" r="1.3"/>
    <circle cx="510"  cy="1020" r="1.0"/>
    <circle cx="680"  cy="1110" r="1.8"/>
    <circle cx="830"  cy="1040" r="1.2"/>
  </g>

  <!-- Parlayan büyük yıldız (Süreyya gibi) -->
  <g transform="translate(870 200)" fill="#f0d999" filter="url(#soft-glow)">
    <polygon points="0,-22 5,-7 22,-7 9,3 14,18 0,9 -14,18 -9,3 -22,-7 -5,-7"/>
  </g>

  <!-- İnce hilal — sağ üstte, küçük -->
  <g transform="translate(820 240)" filter="url(#soft-glow)">
    <path d="M 22,0 a 22,22 0 1,1 -10,-19 a 17,17 0 1,0 0,38 a 22,22 0 0,1 10,-19 Z"
          fill="#f0d999" opacity="0.9"/>
  </g>

  <!-- ŞEHİR/MESCİD SİLÜETİ — alt kısımda -->
  <g fill="url(#silhouette)" opacity="0.85">
    <!-- Zemin -->
    <rect x="0" y="1700" width="1080" height="220"/>

    <!-- Sol minare -->
    <rect x="120" y="1380" width="22" height="320"/>
    <circle cx="131" cy="1370" r="14"/>
    <polygon points="131,1356 124,1342 138,1342"/>
    <line x1="131" y1="1342" x2="131" y2="1314" stroke="#0a0818" stroke-width="3"/>
    <circle cx="131" cy="1310" r="5"/>
    <!-- minare şerefe -->
    <rect x="116" y="1444" width="30" height="6"/>
    <rect x="116" y="1500" width="30" height="6"/>

    <!-- Sol küçük kubbe -->
    <path d="M 180 1520 Q 180 1450 235 1450 Q 290 1450 290 1520 L 290 1700 L 180 1700 Z"/>
    <circle cx="235" cy="1440" r="6"/>

    <!-- Orta — Ana kubbe (Mescid-i Nebevî gibi geniş) -->
    <path d="M 380 1500 Q 380 1340 540 1340 Q 700 1340 700 1500 L 700 1700 L 380 1700 Z"/>
    <!-- alt mukarnaslar -->
    <rect x="370" y="1500" width="340" height="14"/>
    <!-- Kubbe tepesi alem -->
    <circle cx="540" cy="1325" r="9"/>
    <polygon points="540,1316 533,1300 547,1300"/>
    <line x1="540" y1="1300" x2="540" y2="1276" stroke="#0a0818" stroke-width="3"/>
    <circle cx="540" cy="1272" r="6"/>

    <!-- Sağ küçük kubbe -->
    <path d="M 790 1520 Q 790 1450 845 1450 Q 900 1450 900 1520 L 900 1700 L 790 1700 Z"/>
    <circle cx="845" cy="1440" r="6"/>

    <!-- Sağ minare -->
    <rect x="940" y="1380" width="22" height="320"/>
    <circle cx="951" cy="1370" r="14"/>
    <polygon points="951,1356 944,1342 958,1342"/>
    <line x1="951" y1="1342" x2="951" y2="1314" stroke="#0a0818" stroke-width="3"/>
    <circle cx="951" cy="1310" r="5"/>
    <rect x="936" y="1444" width="30" height="6"/>
    <rect x="936" y="1500" width="30" height="6"/>

    <!-- Yan binalar -->
    <rect x="0"   y="1600" width="120" height="100"/>
    <rect x="290" y="1620" width="90"  height="80"/>
    <rect x="700" y="1620" width="90"  height="80"/>
    <rect x="960" y="1600" width="120" height="100"/>
  </g>

  <!-- Üst kısımda hafif sis / bulut bandı -->
  <ellipse cx="540" cy="1280" rx="700" ry="60" fill="#1d2a5a" opacity="0.4"/>

  <!-- Vignette — kenarlara doğru karanlık -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="80%">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
  </radialGradient>
  <rect width="1080" height="1920" fill="url(#vignette)"/>
</svg>
