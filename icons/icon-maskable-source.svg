<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#1d2a5a"/>
      <stop offset="55%" stop-color="#131a36"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d999"/>
      <stop offset="55%" stop-color="#c9a45a"/>
      <stop offset="100%" stop-color="#a68043"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Full bleed background — Android maskable will crop -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- All key visuals must stay inside the safe zone:
       radius 102.4px from center for a 40% safe-zone of 512.
       Center is (256, 256). Keep everything within roughly 154-358. -->

  <!-- Star — placed at upper-right within safe zone -->
  <g transform="translate(310 200) scale(0.8)" filter="url(#glow)">
    <polygon points="0,-44 11,-14 42,-14 17,4 27,34 0,16 -27,34 -17,4 -42,-14 -11,-14"
             fill="url(#gold)"/>
  </g>

  <!-- Crescent — centered, smaller for safe zone -->
  <g transform="translate(240 280) scale(0.7)" filter="url(#glow)">
    <path d="M 0,-120 A 120,120 0 1,0 0,120 A 96,96 0 1,1 0,-120 Z" fill="url(#gold)"/>
  </g>
</svg>
